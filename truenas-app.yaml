# Stoa - TrueNAS Custom App deployment
version: "3.8"

services:

  stoa-backend:
    image: ghcr.io/the-d-b/stoa-backend:latest
    container_name: stoa-backend
    restart: unless-stopped
    environment:
      STOA_DB_PATH: /data/db/stoa.db
      STOA_ICONS_DIR: /data/icons
      STOA_PORT: "8080"
      STOA_FRONTEND_PATH: /dev/null
      STOA_ALLOWED_ORIGINS: "http://localhost,https://stoa.rose.home"
    volumes:
      - /mnt/tna01-fassdpool/container_data/stoa/db:/data/db
      - /mnt/tna01-fassdpool/container_data/stoa/icons:/data/icons
      - /mnt/tna01-fassdpool/container_data/stoa/css:/data/css
      - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates:ro
    networks:
      - stoa-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/setup/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  stoa-frontend:
    image: ghcr.io/the-d-b/stoa-frontend:latest
    container_name: stoa-frontend
    restart: unless-stopped
    ports:
      - "30080:80"
    depends_on:
      - stoa-backend
    networks:
      - stoa-net

networks:
  stoa-net:
    driver: bridge
