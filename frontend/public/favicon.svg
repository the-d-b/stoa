<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark badge background -->
  <rect width="100" height="100" rx="22" fill="#13111f"/>

  <!-- Torso -->
  <path d="M28 74 C24 88 32 98 50 98 C68 98 76 88 72 74 Z" fill="#7c6fff"/>
  <!-- Head -->
  <circle cx="50" cy="52" r="32" fill="#7c6fff"/>
  <!-- Left ear tuft -->
  <polygon points="25,32 31,4 45,28" fill="#7c6fff"/>
  <!-- Right ear tuft (slightly higher) -->
  <polygon points="55,28 69,2 75,32" fill="#7c6fff"/>

  <!-- Facial disc -->
  <ellipse cx="50" cy="54" rx="23" ry="21" fill="#a594ff"/>

  <!-- Left eye -->
  <circle cx="36" cy="49" r="12" fill="white"/>
  <circle cx="37.5" cy="49" r="8.5" fill="#0e0c1a"/>
  <circle cx="41" cy="45" r="3" fill="white"/>

  <!-- Right eye -->
  <circle cx="64" cy="49" r="12" fill="white"/>
  <circle cx="62.5" cy="49" r="8.5" fill="#0e0c1a"/>
  <circle cx="67" cy="45" r="3" fill="white"/>

  <!-- Beak -->
  <polygon points="44,62 56,62 50,72" fill="#f5c518"/>
</svg>
